services:
  postgres:
    image: postgres:16-alpine
    container_name: immigration-ai-db
    environment:
      POSTGRES_USER: immigration
      POSTGRES_PASSWORD: immigration_dev
      POSTGRES_DB: immigration_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immigration -d immigration_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
